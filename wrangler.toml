name = "andre-fiscaliza"
main = "worker/src/index.ts"
compatibility_date = "2026-04-19"

[[d1_databases]]
binding = "DB"
database_name = "andre-fiscaliza-db"
database_id = "YOUR_DATABASE_ID"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "andre-fiscaliza-docs"

[vars]
ADMIN_USER = "andre"

[site]
bucket = "./frontend/public"
