name = "andre-fiscaliza"
main = "worker/src/index.ts"
compatibility_date = "2026-04-19"

[[d1_databases]]
binding = "DB"
database_name = "andre-fiscaliza-db"
database_id = "2247ec50-7ca7-46bb-955e-195bc521462b"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "andre-fiscaliza-docs"

[vars]
ADMIN_USER = "andre"
JWT_SECRET = "fiscaliza-secret-2026-key"

[assets]
directory = "./frontend/public"
binding = "ASSETS"
